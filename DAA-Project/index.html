<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rat in Maze Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐭 Rat in Maze (Advanced)</h1>

<div id="maze"></div>

<div class="controls">
    <button onclick="move('up')">⬆️</button><br>
    <button onclick="move('left')">⬅️</button>
    <button onclick="move('down')">⬇️</button>
    <button onclick="move('right')">➡️</button>
</div>

<div class="actions">
    <button onclick="autoSolve()">🔥 Auto Solve</button>
    <button onclick="shortestPath()">🎯 Shortest Path</button>
    <button onclick="generateMaze()">🧠 New Maze</button>
</div>

<div id="info">
    ⏱️ Time: <span id="time">0</span>s |
    ⭐ Score: <span id="score">0</span>
</div>

<p id="msg"></p>

<script src="script.js"></script>
</body>
</html>
